volumes:
  db-data:

services:
  dblab:
    image: postgresai/dblab-server:4.0.4
    restart: unless-stopped
    privileged: true
    ports:
      - 2345:2345
    environment:
      DOCKER_API_VERSION: ${DOCKER_API_VERSION}
      PGPASSWORD: ${DB_PASSWORD}
      DLE_VERIFICATION_TOKEN: ${DBLAB_VERIFICATION_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/dblab:/var/lib/dblab:rshared
      - ${HOME}/.dblab/engine/configs:/home/dblab/configs
      - ./dblab-server.yml:/home/dblab/configs/server.yml:ro
      - ${HOME}/.dblab/engine/meta:/home/dblab/meta
      - ${HOME}/.dblab/engine/logs:/home/dblab/logs
      - /sys/kernel/debug:/sys/kernel/debug:rw
      - /lib/modules:/lib/modules:ro
      - /proc:/host_proc:ro

  dblab-ui:
    image: postgresai/ce-ui:4.0.4
    restart: unless-stopped
    environment:
      API_URL_PREFIX: http://dblab:2345
      WS_URL_PREFIX: http://dblab:2345
    ports:
      - 2346:2346

  db:
    image: ghcr.io/kvdomingo/postgresql-pig:18
    restart: unless-stopped
    shm_size: 1g
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql
      - ./postgresql.conf:/etc/postgresql/postgresql.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      start_period: 10s
      interval: 20s
      timeout: 5s
      retries: 3

  backup:
    image: offen/docker-volume-backup:v2
    restart: unless-stopped
    environment:
      AWS_S3_BUCKET_NAME: lab-srv-pg-01-backups
      AWS_S3_PATH: backup/db-primary
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      BACKUP_CRON_EXPRESSION: "0 0 * * *"
      BACKUP_COMPRESSION: zst
      BACKUP_FILENAME: "backup-%Y%m%dT%H%M%SZ.{{ .Extension }}"
      BACKUP_FILENAME_EXPAND: true
      BACKUP_FROM_SNAPSHOT: true
    volumes:
      - db-data:/backup/db-primary:ro

  supavisor:
    image: supabase/supavisor:2.7.4
    restart: unless-stopped
    environment:
      PORT: 4000
      PROXY_PORT_SESSION: 5433
      PROXY_PORT_TRANSACTION: 6543
      DATABASE_URL: "ecto://postgres:${DB_PASSWORD}@db:5432/postgres"
      CLUSTER_POSTGRES: true
      SECRET_KEY_BASE: ${POOLER_SECRET_KEY_BASE}
      VAULT_ENC_KEY: ${POOLER_VAULT_ENC_KEY}
      API_JWT_SECRET: ${POOLER_API_JWT_SECRET}
      METRICS_JWT_SECRET: ${POOLER_METRICS_JWT_SECRET}
      REGION: "local"
      ERL_AFLAGS: -proto_dist inet_tcp
      POOLER_TENANT_ID: kvdstudio
      POOLER_DEFAULT_POOL_SIZE: 20
      POOLER_MAX_CLIENT_CONN: 100
      POOLER_POOL_MODE: transaction
    command:  sh -c "/app/bin/migrate && /app/bin/server"
    ports:
      - 4000:4000
      - 5433:5433
      - 6543:6543
    depends_on:
      db:
        condition: service_started
