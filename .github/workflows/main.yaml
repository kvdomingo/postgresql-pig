name: "[Pipeline] Build and deploy Docker images"

on:
  push:
    branches: [main]
    paths:
      - .github/**
      - dblab-server.yml
      - docker-compose.yml
      - Dockerfile
      - pgbackrest.conf
      - postgresql.conf
  workflow_dispatch:

concurrency:
  group: build
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        name: Checkout

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            build:
              - Dockerfile
    outputs:
      build: ${{ steps.filter.outputs.build }}

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: [18]
    needs: changes
    if: needs.changes.outputs.build == 'true'
    name: Build PostgreSQL ${{ matrix.version }} with Pig CLI
    steps:
      - uses: actions/checkout@v4
        name: Checkout

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/postgresql-pig
          tags: |
            type=sha
            type=raw,value=${{ matrix.version }}
            type=raw,value=latest,enabled=${{ matrix.version == '18' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          build-args: |
            PG_VERSION=${{ matrix.version }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: self-hosted
    needs: [build]
    if: always() && !cancelled()
    name: Deploy to srv-pg-01
    steps:
      - uses: actions/checkout@v4
        name: Checkout

      # - name: Setup Infisical
      #   uses: infisical/secrets-action@v1.0.15
      #   with:
      #     method: oidc
      #     identity-id: ${{ vars.INFISICAL_IDENTITY_ID }}
      #     project-slug: srv-pg
      #     env-slug: prod
      #     domain: https://infisical.lab.kvd.studio

      - name: Deploy
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          BACKBLAZE_KEY_ID: ${{ secrets.BACKBLAZE_KEY_ID }}
          BACKBLAZE_APP_KEY: ${{ secrets.BACKBLAZE_APP_KEY }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          POOLER_API_JWT_SECRET: ${{ secrets.POOLER_API_JWT_SECRET }}
          POOLER_METRICS_JWT_SECRET: ${{ secrets.POOLER_METRICS_JWT_SECRET }}
          POOLER_SECRET_KEY_BASE: ${{ secrets.POOLER_SECRET_KEY_BASE }}
          POOLER_VAULT_ENC_KEY: ${{ secrets.POOLER_VAULT_ENC_KEY }}
        run: >
          docker compose pull &&
          DOCKER_API_VERSION=$(docker version --format '{{ .Server.APIVersion }}' | awk '{print $1}')
          docker compose up --wait --remove-orphans
