[global]
# repo1: AWS S3
# repo1-s3-key, repo1-s3-key-secret → PGBACKREST_REPO1_S3_KEY, PGBACKREST_REPO1_S3_KEY_SECRET
# repo1-s3-region                   → PGBACKREST_REPO1_S3_REGION
repo1-type=s3
repo1-path=/pgbackrest
repo1-s3-bucket=lab-srv-pg-01-backups
repo1-s3-endpoint=s3.amazonaws.com
repo1-retention-full=2
repo1-retention-full-type=count

# repo2: Backblaze B2 (S3-compatible)
# repo2-s3-key, repo2-s3-key-secret → PGBACKREST_REPO2_S3_KEY, PGBACKREST_REPO2_S3_KEY_SECRET
# repo2-s3-endpoint                 → PGBACKREST_REPO2_S3_ENDPOINT  (e.g. s3.us-west-004.backblazeb2.com)
# repo2-s3-region                   → PGBACKREST_REPO2_S3_REGION    (e.g. us-west-004)
repo2-type=s3
repo2-path=/pgbackrest
repo2-s3-bucket=kvdstudio-srv-pg-backups
repo2-s3-uri-style=path
repo2-retention-full=2
repo2-retention-full-type=count

start-fast=y
archive-async=y
log-level-console=info
log-level-file=detail
log-path=/var/log/pgbackrest
spool-path=/var/spool/pgbackrest

[db]
pg1-path=/var/lib/postgresql/data
