[global]
# repo1: Backblaze B2 (S3-compatible)
# repo1-s3-key, repo1-s3-key-secret → PGBACKREST_repo1_S3_KEY, PGBACKREST_repo1_S3_KEY_SECRET
# repo1-s3-endpoint                 → PGBACKREST_repo1_S3_ENDPOINT  (e.g. s3.us-west-004.backblazeb2.com)
# repo1-s3-region                   → PGBACKREST_repo1_S3_REGION    (e.g. us-west-004)
repo1-type=s3
repo1-path=/pgbackrest
repo1-s3-bucket=kvdstudio-srv-pg-backups
repo1-s3-uri-style=path
repo1-retention-full=2
repo1-retention-full-type=count

start-fast=y
archive-async=y
log-level-console=info
log-level-file=detail
log-path=/var/log/pgbackrest
spool-path=/var/spool/pgbackrest

[db]
pg1-path=/var/lib/postgresql/18/docker
